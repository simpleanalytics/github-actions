name: Deploy App

on:
  workflow_call:
    inputs:
      app:
        description: Name of the app to deploy, like esapi or queue
        required: true
        type: string
      image_repo:
        description: Image repo, like ghcr.io/simpleanalytics/elasticsearch
        required: true
        type: string

jobs:
  deploy:
    name: Deploy via webhook
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: deploy-${{ inputs.env }}
    steps:
      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag image as production
        run: |
          docker pull ${{ inputs.image_repo }}:${{ github.sha }}
          docker tag ${{ inputs.image_repo }}:${{ github.sha }} ${{ inputs.image_repo }}:production
          docker push ${{ inputs.image_repo }}:production

      - name: Trigger deployment webhook with output
        run: |
          set -uo pipefail # no "e" because we want to retrieve the curl output

          hosts=( "es04" "es06" "es07" )
          for host in "${hosts[@]}"; do
            curl -sSf --user "token:${{ secrets.DEPLOY_TOKEN }}" \
              --write-out "%{http_code}" --output response_$host.tmp \
              "https://webhook.$host.simpleanalytics.com:444/deploy?app=${{ inputs.app }}" > status_$host.txt 2>&1 &
          done

          for pid in $(jobs -p); do
            wait "$pid"
          done

          # Read status codes and responses after all jobs have completed
          for host in "${hosts[@]}"; do
            echo "Host $host:"
            echo "HTTP Status Code: $(cat status_$host.txt)"
            echo "Response Body:"
            cat response_$host.tmp
            echo "" # for better readability
          done
